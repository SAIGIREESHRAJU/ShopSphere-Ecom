<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSphere E-Commerce</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="nav-brand">ShopSphere</div>
        <div class="nav-links">
            <button id="nav-products" class="nav-btn active">Products</button>
            <button id="nav-cart" class="nav-btn">Cart (<span id="cart-count">0</span>)</button>
            <button id="nav-orders" class="nav-btn hidden">Orders</button>
            <button id="nav-admin" class="nav-btn hidden text-primary font-bold">Admin Panel</button>
            <button id="nav-login" class="nav-btn btn-primary">Login / Sign Up</button>
            <button id="nav-logout" class="nav-btn btn-danger hidden">Logout</button>
        </div>
    </nav>

    <main class="container">
        <!-- Products Section -->
        <section id="section-products" class="section active">
            <h2>Featured Products</h2>
            <div id="products-grid" class="grid">
                <!-- Products dynamically loaded here -->
            </div>
        </section>

        <!-- Cart Section -->
        <section id="section-cart" class="section hidden">
            <h2>Your Shopping Cart</h2>
            <div class="cart-container">
                <div id="cart-items" class="cart-items">
                    <!-- Cart items dynamically loaded -->
                </div>
                <div class="cart-summary">
                    <h3>Order Summary</h3>
                    <div class="summary-row">
                        <span>Total:</span>
                        <span id="cart-total">Rs. 0.00</span>
                    </div>
                    <button id="btn-checkout" class="btn btn-primary w-100 mt-3" disabled>Checkout</button>
                    <p id="checkout-msg" class="text-error mt-2 hidden">Please login to checkout.</p>
                </div>
            </div>
        </section>

        <!-- Orders Section -->
        <section id="section-orders" class="section hidden">
            <h2>Order History</h2>
            <div id="orders-list" class="orders-list">
                <!-- Orders dynamically loaded here -->
            </div>
        </section>

        <!-- Admin Section -->
        <section id="section-admin" class="section hidden">
            <h2>Admin Panel - Add Product</h2>
            <div class="card" style="max-width: 600px; margin: 0 auto;">
                <div class="modal-tabs">
                    <button id="tab-single-product" class="tab active">Single</button>
                    <button id="tab-bulk-product" class="tab">Bulk (JSON)</button>
                </div>

                <form id="admin-single-form">
                    <div class="input-group">
                        <label>Product Name</label>
                        <input type="text" id="admin-p-name" required placeholder="e.g. Laptop">
                    </div>
                    <div class="input-group">
                        <label>Description</label>
                        <input type="text" id="admin-p-desc" placeholder="Product details">
                    </div>
                    <div class="input-group">
                        <label>Price (Rs. )</label>
                        <input type="number" step="0.01" id="admin-p-price" required placeholder="99.99">
                    </div>
                    <div class="input-group">
                        <label>Stock Quantity</label>
                        <input type="number" id="admin-p-stock" required placeholder="10">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mt-2">Add Product</button>
                </form>

                <form id="admin-bulk-form" class="hidden">
                    <div class="input-group">
                        <label>JSON Array</label>
                        <textarea id="admin-p-json" rows="10" required
                            placeholder='[{"name":"Phone","price":500,"stockQuantity":10}]'
                            style="padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 0.5rem; outline: none; transition: border-color 0.2s; font-family: monospace;"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mt-2">Bulk Upload Products</button>
                </form>

                <p id="admin-msg" class="mt-3"></p>
            </div>
        </section>
    </main>

    <!-- Auth Modal Overlay -->
    <div id="auth-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div class="modal-tabs">
                <button id="tab-login" class="tab active">Login</button>
                <button id="tab-signup" class="tab">Sign Up</button>
            </div>

            <form id="auth-form">
                <div id="group-name" class="input-group hidden">
                    <label for="auth-name">Name</label>
                    <input type="text" id="auth-name" placeholder="Enter your name">
                </div>
                <div class="input-group">
                    <label for="auth-email">Email</label>
                    <input type="email" id="auth-email" required placeholder="Enter your email">
                </div>
                <div class="input-group">
                    <label for="auth-password">Password</label>
                    <input type="password" id="auth-password" required placeholder="Enter your password">
                </div>
                <button type="submit" id="btn-auth-submit" class="btn btn-primary w-100 mt-2">Login</button>
                <p id="auth-error" class="text-error mt-2 hidden"></p>
                <p id="auth-success" class="text-success mt-2 hidden"></p>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
